settings.autoGroupMenus=Group recent projects by parent directory
settings.autoGroupMenus.description=In File > Recent Projects, shared parent directories become flat titled sections and single projects are collected under Other. In the project toolbar widget, the same sections use matching rainbow-colored frames. Welcome Screen groups are unchanged.
settings.autoLoadGitBranchesWhenMissing=Read Git branch when IntelliJ does not provide it
settings.autoLoadGitBranchesWhenMissing.description=Only when the project widget has no branch value, read and cache .git/HEAD in the background. No Git command is executed; a recovered branch uses the original separate detail line.
